# 瑞建石油装备 - Decap CMS 配置
backend:
  name: github
  repo: serverhu/ruijian-website
  branch: main
  base_url: https://ruijian.pages.dev
  auth_endpoint: api/auth

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "settings"
    label: "网站设置"
    files:
      - name: "company"
        label: "公司信息"
        file: "data/company.yml"
        fields:
          - { label: "公司名称", name: "name", widget: "string" }
          - { label: "联系电话", name: "phone", widget: "string" }
          - { label: "邮箱", name: "email", widget: "string" }
