<body>
  <div class="loading">
    <div class="loading-icon">R</div>
    <h1>Ruijian Petroleum Equipment</h1>
    <div class="spinner"></div>
    <p style="font-size:0.8rem;opacity:0.5;margin-top:8px;">Redirecting to your language...</p>
  </div>
  
  <script>
  // GeoIP-based language detection
  (function() {
    const LANG_MAP = {
      'zh': { path: '/zh/', name: '中文' },
      'en': { path: '/en/', name: 'English' },
      'ar': { path: '/ar/', name: 'العربية' },
      'ru': { path: '/ru/', name: 'Русский' },
      'es': { path: '/es/', name: 'Español' },
      'fr': { path: '/fr/', name: 'Français' }
    };
    
    const GEO_MAP = {
      CN:'zh',TW:'zh',HK:'zh',MO:'zh',
      US:'en',GB:'en',AU:'en',CA:'en',IN:'en',SG:'en',
      SA:'ar',AE:'ar',IQ:'ar',KW:'ar',QA:'ar',OM:'ar',EG:'ar',
      RU:'ru',KZ:'ru',UZ:'ru',
      MX:'es',ES:'es',VE:'es',CO:'es',AR:'es',
      FR:'fr',DZ:'fr',MA:'fr',TN:'fr'
    };

    function getLang() {
      // Check cookie
      var match = document.cookie.match(/(^| )ruijian_lang=([^;]+)/);
      if (match && LANG_MAP[match[2]]) return match[2];
      
      // Check browser
      var navLang = (navigator.language || navigator.userLanguage || '').split('-')[0].toLowerCase();
      if (LANG_MAP[navLang]) return navLang;
      if (navLang.startsWith('zh')) return 'zh';
      
      return null;
    }

    function redirectByIP() {
      var saved = getLang();
      if (saved) { window.location.href = LANG_MAP[saved].path; return; }
      
      // Try GeoIP
      var xhr = new XMLHttpRequest();
      xhr.open('GET', 'https://ipapi.co/json/', true);
      xhr.timeout = 3000;
      xhr.onload = function() {
        try {
          var data = JSON.parse(xhr.responseText);
          var code = data.country_code;
          var lang = GEO_MAP[code] || 'en';
          window.location.href = LANG_MAP[lang].path;
        } catch(e) {
          window.location.href = '/en/';
        }
      };
      xhr.onerror = function() { window.location.href = '/en/'; };
      xhr.send();
    }
    
    redirectByIP();
  })();
  </script>
</body>
